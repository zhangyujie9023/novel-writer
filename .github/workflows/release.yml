name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Novel-Writer ${{ github.ref_name }}'
          releaseBody: |
            ## Novel-Writer v${{ github.ref_name }}

            AI 小说写作工作台 - 长篇创作利器

            ### 更新内容
            请查看 CHANGELOG.md 获取详细更新日志

            ### 安装说明
            下载下方 `.exe` 安装包进行安装，支持自动更新
          releaseDraft: false
          prerelease: false
          # 显式包含 latest.json 作为发布资产（自动更新用）
          assets: >-
            [
              "src-tauri/target/release/bundle/nsis/*.exe",
              "src-tauri/target/release/bundle/nsis/latest.json"
            ]

      - name: Upload latest.json (backup)
        if: always()
        run: |
          $json = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "latest.json" -ErrorAction SilentlyContinue
          if ($json) {
            Write-Output "Found latest.json: $($json.FullName)"
          } else {
            Write-Output "latest.json not found in bundle directory"
          }
